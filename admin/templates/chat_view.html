<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with {{ phone }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <nav class="bg-indigo-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Conversation View</h1>
            <a href="/admin" class="hover:underline">← Back to Dashboard</a>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <div class="bg-white rounded-lg shadow-md max-w-4xl mx-auto flex flex-col h-[80vh]">
            <!-- Header -->
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <div>
                    <h3 class="text-xl font-bold">{{ phone }}</h3>
                    <p class="text-sm text-gray-500">Stage: <span class="font-semibold">{{ conversation.stage }}</span></p>
                </div>
                <div class="space-x-2">
                    <button onclick="takeover()" class="bg-orange-500 text-white px-4 py-2 rounded shadow hover:bg-orange-600">Take Over</button>
                    <button onclick="resume()" class="bg-blue-500 text-white px-4 py-2 rounded shadow hover:bg-blue-600">Resume AI</button>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 bg-[#e5ddd5]">
                {% for msg in messages %}
                <div class="flex {% if msg.role == 'ai' %}justify-start{% else %}justify-end{% endif %}">
                    <div class="max-w-[70%] rounded-lg px-4 py-2 shadow-sm 
                        {% if msg.role == 'ai' %}bg-white text-gray-800{% else %}bg-[#dcf8c6] text-gray-800{% endif %}">
                        <p class="text-sm">{{ msg.content }}</p>
                        <span class="text-[10px] text-gray-400 block mt-1">{{ msg.timestamp.strftime('%H:%M') }}</span>
                    </div>
                </div>
                {% endfor %}
            </div>

            <!-- Input Area (Only for Human Mode) -->
            <div class="p-4 border-t bg-gray-50">
                <form id="reply-form" class="flex space-x-2">
                    <input type="text" id="reply-input" placeholder="Type a message..." 
                        class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-full hover:bg-indigo-700">Send</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        const phone = "{{ phone }}";
        const chatBox = document.getElementById('chat-box');
        chatBox.scrollTop = chatBox.scrollHeight;

        async function takeover() {
            await fetch(`/admin/takeover/${phone}`, { method: 'POST' });
            window.location.reload();
        }

        async function resume() {
            await fetch(`/admin/resume/${phone}`, { method: 'POST' });
            window.location.reload();
        }

        document.getElementById('reply-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('reply-input');
            const msg = input.value;
            if (!msg) return;

            // In a real app, this would call a POST /api/send endpoint
            alert("In 'Manual Mode', you should reply directly from your phone's WhatsApp. This dashboard view is for monitoring.");
            input.value = '';
        };
    </script>
</body>
</html>
